<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Telegram App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
      window.TelegramAdsController = new TelegramAdsController();
      window.TelegramAdsController.initialize({
        pubId: "1006720",
        appId: "6798",
      });
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents bouncing/scrolling on mobile */
            background-color: #222;
            font-family: Arial, sans-serif;
            touch-action: none; /* Prevents default touch actions */
        }
        canvas {
            display: block;
            background-color: #70c5ce; /* Sky blue */
            /* Force canvas to take up the whole screen */
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Make canvas dynamically fit the user's screen size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Handle device rotation or resizing
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Game Variables
        let frames = 0;
        let score = 0;
        let bestScore = 0;
        let currentState = 0; // 0 = Get Ready, 1 = Playing, 2 = Game Over

        // Bird Object
        const bird = {
            x: canvas.width * 0.2, // Keep bird 20% from the left edge
            y: canvas.height / 2, 
            width: 24, 
            height: 24,
            gravity: 0.35, 
            jump: 6.5, 
            speed: 0,
            
            draw: function() {
                ctx.fillStyle = "#FFD700"; // Yellow bird
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Bird eye
                ctx.fillStyle = "black";
                ctx.fillRect(this.x + 16, this.y + 4, 4, 4);
            },
            
            update: function() {
                if (currentState === 1) {
                    this.speed += this.gravity;
                    this.y += this.speed;
                    
                    // Floor collision
                    if (this.y + this.height >= canvas.height) {
                        this.y = canvas.height - this.height;
                        currentState = 2; // Game Over
                    }
                    // Ceiling collision
                    if (this.y <= 0) {
                        this.y = 0;
                        this.speed = 0;
                    }
                }
            },
            
            flap: function() {
                this.speed = -this.jump;
            }
        };

        // Pipes Object
        const pipes = {
            position: [],
            width: 50,
            gap: 150, // Slightly larger gap for mobile playability
            dx: 3, // Scroll speed
            
            draw: function() {
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    let topY = p.y;
                    let bottomY = p.y + this.gap;

                    ctx.fillStyle = "#228B22"; // Green pipes
                    ctx.fillRect(p.x, 0, this.width, topY); // Top pipe
                    ctx.fillRect(p.x, bottomY, this.width, canvas.height - bottomY); // Bottom pipe
                }
            },
            
            update: function() {
                if (currentState !== 1) return;

                // Add new pipes every 100 frames
                if (frames % 100 === 0) {
                    this.position.push({
                        x: canvas.width,
                        // Randomize gap keeping it within dynamic screen bounds
                        y: Math.random() * (canvas.height - this.gap - 100) + 50 
                    });
                }

                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= this.dx;

                    // Remove pipes that move off screen
                    if (p.x + this.width <= 0) {
                        this.position.shift();
                        score++;
                        bestScore = Math.max(score, bestScore);
                        i--;
                        continue;
                    }

                    // Collision detection
                    let bottomY = p.y + this.gap;
                    if (bird.x + bird.width > p.x && bird.x < p.x + this.width &&
                        (bird.y < p.y || bird.y + bird.height > bottomY)) {
                        currentState = 2; // Game Over
                    }
                }
            },
            
            reset: function() {
                this.position = [];
            }
        };

        // Draw Everything
        function draw() {
            ctx.fillStyle = "#70c5ce"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            pipes.draw();
            bird.draw();

            // UI
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 2;
            ctx.textAlign = "center";

            // Dynamically center text based on screen size
            if (currentState === 0) {
                ctx.font = "bold 28px Arial";
                ctx.fillText("TAP TO START", canvas.width / 2, canvas.height / 2 - 50);
                ctx.strokeText("TAP TO START", canvas.width / 2, canvas.height / 2 - 50);
            } else if (currentState === 1) {
                ctx.font = "bold 40px Arial";
                ctx.fillText(score, canvas.width / 2, 80);
                ctx.strokeText(score, canvas.width / 2, 80);
            } else if (currentState === 2) {
                ctx.font = "bold 32px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 60);
                ctx.strokeText("GAME OVER", canvas.width / 2, canvas.height / 2 - 60);
                
                ctx.font = "bold 22px Arial";
                ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillText("Best: " + bestScore, canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.font = "bold 20px Arial";
                ctx.fillText("TAP TO RESTART", canvas.width / 2, canvas.height / 2 + 80);
                ctx.strokeText("TAP TO RESTART", canvas.width / 2, canvas.height / 2 + 80);
            }
        }

        function update() {
            bird.update();
            pipes.update();
        }

        function loop() {
            update();
            draw();
            frames++;
            requestAnimationFrame(loop);
        }

        function handleInput() {
            if (currentState === 0) {
                currentState = 1; 
                bird.flap();
            } else if (currentState === 1) {
                bird.flap(); 
            } else if (currentState === 2) {
                
                // --- AD TRIGGER LOGIC ---
                // Attempts to show the ad when the user restarts the game
                if (window.TelegramAdsController && typeof window.TelegramAdsController.showAd === 'function') {
                    try {
                        window.TelegramAdsController.showAd();
                    } catch(e) {
                        console.error("Ad failed to trigger:", e);
                    }
                }

                // Restart game logic
                currentState = 0;
                pipes.reset();
                bird.speed = 0;
                bird.y = canvas.height / 2;
                score = 0;
            }
        }

        // Input Listeners
        canvas.addEventListener("mousedown", handleInput);
        canvas.addEventListener("touchstart", function(e) {
            e.preventDefault(); 
            handleInput();
        }, {passive: false});
        
        document.addEventListener("keydown", function(e) {
            if (e.code === "Space") {
                handleInput();
            }
        });

        // --- TELEGRAM INIT LOGIC ---
        // Tells Telegram the app is fully loaded and expands the view
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // Start the loop
        loop();
    </script>
</body>
</html>
