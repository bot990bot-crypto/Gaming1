<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Monetized Edition</title>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            display: block;
            transition: background-color 1s ease;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Lets clicks pass through to canvas where needed */
            background: rgba(0,0,0,0.4);
        }
        h1 { margin: 0; font-size: 48px; text-align: center;}
        p { font-size: 20px; }
        .hidden { display: none !important; }
        
        /* Interactive UI Elements */
        .interactive { pointer-events: auto; }
        
        .btn {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #e74c3c;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background-color: #c0392b; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        
        .reward-btn {
            background-color: #f39c12;
        }
        .reward-btn:hover { background-color: #d68910; }

        #task-container {
            margin-top: 25px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="hud" class="hidden">
        <span id="scoreDisplay">Score: 0</span>
        <span id="levelDisplay">Level: 1</span>
    </div>

    <div id="ui-layer">
        <h1 id="title">Flappy Bird</h1>
        <p id="subtitle">Click or Press Space to Jump</p>
        
        <button id="actionBtn" class="btn interactive">Start Game</button>
        <button id="rewardBtn" class="btn reward-btn interactive hidden">🎥 Watch Ad for +5 Score</button>
        
        <div id="task-container" class="interactive">
            <adsgram-task
                data-block-id="task-26186"
                data-debug="true"
                data-debug-console="false"
                class="task">
            </adsgram-task>
        </div>
    </div>
</div>

<script>
    // --- AdsGram Initialization ---
    let rewardedAd = null;
    let interstitialAd = null;
    let gamesPlayed = 0; // Tracks game overs for the interstitial ad

    window.addEventListener('load', () => {
        if (window.Adsgram) {
            // Initialize Ads
            rewardedAd = window.Adsgram.init({ blockId: "26182" });
            interstitialAd = window.Adsgram.init({ blockId: "int-26183" });
            
            // Show interstitial ad on game start / page load
            interstitialAd.show().catch((err) => {
                console.log('Initial Interstitial Ad skipped or failed:', err);
            });
        } else {
            console.error("AdsGram SDK failed to load.");
        }
    });

    // --- Game Logic ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('ui-layer');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const actionBtn = document.getElementById('actionBtn');
    const rewardBtn = document.getElementById('rewardBtn');
    const hud = document.getElementById('hud');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const levelDisplay = document.getElementById('levelDisplay');

    let frames = 0;
    let score = 0;
    let level = 1;
    let gameState = 'START'; 
    let animationId;

    const levels = [
        { scoreThreshold: 0,  pipeSpeed: 2.5, pipeGap: 140, pipeFreq: 120, bgColor: '#70c5ce' }, 
        { scoreThreshold: 10, pipeSpeed: 3.5, pipeGap: 120, pipeFreq: 100, bgColor: '#103642' }, 
        { scoreThreshold: 20, pipeSpeed: 4.5, pipeGap: 100, pipeFreq: 85,  bgColor: '#4a1111' }, 
        { scoreThreshold: 35, pipeSpeed: 6.0, pipeGap: 90,  pipeFreq: 70,  bgColor: '#2b0638' }  
    ];
    let currentLevelConfig = levels[0];
    canvas.style.backgroundColor = currentLevelConfig.bgColor;

    const bird = {
        x: 50, y: 150, radius: 12, velocity: 0, gravity: 0.25, jump: -5.5,
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#f1c40f';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
            
            // Eye
            ctx.beginPath();
            ctx.arc(this.x + 4, this.y - 4, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.arc(this.x + 5, this.y - 4, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        },
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            
            if (this.y + this.radius >= canvas.height) {
                this.y = canvas.height - this.radius;
                gameOver();
            }
            if (this.y - this.radius <= 0) {
                this.y = this.radius;
                this.velocity = 0;
            }
        },
        flap() { this.velocity = this.jump; }
    };

    const pipes = {
        items: [], width: 50,
        draw() {
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(p.x, 0, this.width, p.topHeight);
                ctx.strokeRect(p.x, 0, this.width, p.topHeight);
                ctx.fillRect(p.x, p.topHeight + currentLevelConfig.pipeGap, this.width, canvas.height);
                ctx.strokeRect(p.x, p.topHeight + currentLevelConfig.pipeGap, this.width, canvas.height);
            }
        },
        update() {
            if (frames % currentLevelConfig.pipeFreq === 0) {
                let minPipeHeight = 50;
                let maxPipeHeight = canvas.height - currentLevelConfig.pipeGap - minPipeHeight;
                let topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
                this.items.push({ x: canvas.width, topHeight: topHeight, passed: false });
            }

            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= currentLevelConfig.pipeSpeed;

                if (bird.x + bird.radius > p.x && bird.x - bird.radius < p.x + this.width) {
                    if (bird.y - bird.radius < p.topHeight || bird.y + bird.radius > p.topHeight + currentLevelConfig.pipeGap) {
                        gameOver();
                    }
                }

                if (p.x + this.width < bird.x && !p.passed) {
                    score++;
                    p.passed = true;
                    checkLevelUp();
                }

                if (p.x + this.width < 0) {
                    this.items.shift();
                    i--;
                }
            }
        },
        reset() { this.items = []; }
    };

    function checkLevelUp() {
        scoreDisplay.innerText = `Score: ${score}`;
        let newLevel = 1;
        let newConfig = levels[0];

        for (let i = levels.length - 1; i >= 0; i--) {
            if (score >= levels[i].scoreThreshold) {
                newLevel = i + 1;
                newConfig = levels[i];
                break;
            }
        }

        if (newLevel !== level) {
            level = newLevel;
            currentLevelConfig = newConfig;
            levelDisplay.innerText = `Level: ${level}`;
            canvas.style.backgroundColor = currentLevelConfig.bgColor;
        }
    }

    // Input Controllers
    canvas.addEventListener('mousedown', () => {
        if (gameState === 'PLAYING') bird.flap();
    });

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (gameState === 'PLAYING') bird.flap();
            else if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
        }
    });

    actionBtn.addEventListener('click', startGame);

    // Rewarded Ad Click Logic
    rewardBtn.addEventListener('click', () => {
        if (rewardedAd) {
            rewardedAd.show().then(() => {
                // Reward the user
                score += 5;
                checkLevelUp();
                subtitle.innerText = `Final Score: ${score} (Level ${level})`;
                rewardBtn.classList.add('hidden'); // Hide after they claim it once
            }).catch((err) => {
                console.log('Rewarded Ad failed or was closed early', err);
            });
        } else {
            alert("Ad is not ready yet!");
        }
    });

    function startGame() {
        bird.y = 150;
        bird.velocity = 0;
        pipes.reset();
        score = 0;
        level = 1;
        currentLevelConfig = levels[0];
        frames = 0;
        
        canvas.style.backgroundColor = currentLevelConfig.bgColor;
        scoreDisplay.innerText = `Score: 0`;
        levelDisplay.innerText = `Level: 1`;
        
        uiLayer.classList.add('hidden');
        uiLayer.style.background = 'transparent';
        hud.classList.remove('hidden');
        rewardBtn.classList.add('hidden');
        
        gameState = 'PLAYING';
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        gamesPlayed++;

        // Trigger Interstitial every 5 games
        if (gamesPlayed % 5 === 0 && interstitialAd) {
            interstitialAd.show().catch(err => console.log('Interstitial err:', err));
        }

        uiLayer.classList.remove('hidden');
        uiLayer.style.background = 'rgba(0,0,0,0.6)';
        hud.classList.add('hidden');
        
        title.innerText = "Game Over!";
        subtitle.innerText = `Final Score: ${score} (Level ${level})`;
        actionBtn.innerText = "Play Again";
        
        // Show the reward button so they can get extra points
        rewardBtn.classList.remove('hidden');
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'PLAYING') {
            bird.update();
            pipes.update();
            frames++;
        }

        if (gameState !== 'START') {
            pipes.draw();
            bird.draw();
        } else {
            bird.y = 150 + Math.sin(frames * 0.1) * 10;
            bird.draw();
            frames++;
        }

        animationId = requestAnimationFrame(loop);
    }

    loop();
</script>

</body>
</html>
